services:
  backend:
    build:
      context: ./backend
    working_dir: /app
    environment:
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      OPENAI_MODEL_MINI: ${OPENAI_MODEL_MINI:-gpt-4.1-mini}
      OPENAI_MODEL_EXTRACTION: ${OPENAI_MODEL_EXTRACTION:-gpt-4.1-mini}
      OPENAI_MODEL_GENERATION: ${OPENAI_MODEL_GENERATION:-gpt-4.1}
      LLM_CONTEXT_SWITCH_TOKENS: ${LLM_CONTEXT_SWITCH_TOKENS:-20000}
      LLM_MOCK: ${LLM_MOCK:-false}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-10}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-INFO}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:5173,http://127.0.0.1:5173}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
      CHOKIDAR_USEPOLLING: "true"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
